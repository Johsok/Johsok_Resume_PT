<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>履歷 Resume</title>
  <link rel="preload" href="theme.js" as="script">
  <link rel="preload" href="bg.js" as="script">
  <link rel="preload" href="data.json" as="fetch" type="application/json">
  <link rel="preload" href="myphoto.png" as="image">
  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: #172326;
      background: #eef2f1;
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", Arial, sans-serif;
      line-height: 1.6;
      letter-spacing: 0;
    }
    .top-controls {
      position: fixed;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      width: max-content;
      max-width: calc(100vw - 16px);
    }
    .control-group {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 5px;
      border: 1px solid rgba(130, 150, 145, .42);
      border-radius: 5px;
      background: rgba(255, 255, 255, .95);
      box-shadow: 0 6px 16px rgba(0, 0, 0, .10);
      font-size: 12px;
      line-height: 1.2;
    }
    .control-group label {
      font-weight: 700;
      white-space: nowrap;
    }
    .control-group select {
      width: 8.5em;
      min-height: 24px;
      border: 1px solid rgba(130, 150, 145, .55);
      border-radius: 4px;
      background: #fff;
      color: #172326;
      font: inherit;
      padding: 1px 4px;
    }
    .dynamic-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      background: transparent;
    }
    .resume-root {
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }
    .loading,
    .error {
      width: min(100% - 32px, 920px);
      margin: 96px auto 0;
      padding: 24px;
      color: #56625f;
      text-align: center;
      background: rgba(255, 255, 255, .88);
      border: 1px solid rgba(130, 150, 145, .32);
      border-radius: 8px;
    }
    @media print {
      .top-controls,
      .dynamic-bg { display: none; }
    }
  </style>
  <style id="themeStyle"></style>
</head>
<body>
  <div id="dynamicBackground" class="dynamic-bg" aria-hidden="true"></div>

  <div class="top-controls">
    <div class="control-group">
      <label for="themeSelect">風格</label>
      <select id="themeSelect" aria-label="風格"></select>
    </div>
    <div class="control-group">
      <label for="bgSelect">背景</label>
      <select id="bgSelect" aria-label="動態背景"></select>
    </div>
  </div>

  <main id="resumeRoot" class="resume-root loading" aria-live="polite">正在讀取 data.json</main>

  <script src="bg.js" defer></script>
  <script src="theme.js" defer></script>
</body>
</html>
